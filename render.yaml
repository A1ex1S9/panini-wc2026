services:
  - type: web
    name: panini-wc2026-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: panini-wc2026-db
          property: connectionString
      - key: REDIS_URL
        sync: false          # вставишь вручную из Upstash
      - key: JWT_SECRET
        generateValue: true  # Render сгенерирует случайную строку
      - key: CORS_ORIGINS
        sync: false          # вставишь https://<username>.github.io

databases:
  - name: panini-wc2026-db
    plan: free
    databaseName: panini
    user: panini
