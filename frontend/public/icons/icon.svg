<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0f3f3a"/>
  <rect x="16" y="16" width="480" height="480" rx="68" fill="#bfe0d2" opacity="0.15"/>
  <!-- mosaic tiles -->
  <rect x="0" y="0" width="512" height="512" rx="80" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f3f3a"/>
      <stop offset="1" stop-color="#1f7d74"/>
    </linearGradient>
  </defs>
  <!-- stacked 2 6 -->
  <text x="80" y="320" font-family="Arial Black,sans-serif" font-weight="900" font-size="340" fill="white" opacity="0.95" letter-spacing="-20">2</text>
  <text x="160" y="490" font-family="Arial Black,sans-serif" font-weight="900" font-size="340" fill="white" opacity="0.95" letter-spacing="-20">6</text>
  <!-- gold trophy simplified -->
  <ellipse cx="380" cy="130" rx="55" ry="55" fill="#f6d77c"/>
  <rect x="355" y="175" width="50" height="60" fill="#c99a3a"/>
  <rect x="340" y="230" width="80" height="18" rx="4" fill="#a87b22"/>
  <ellipse cx="380" cy="255" rx="45" ry="12" fill="#8a6418"/>
  <!-- FIFA text -->
  <text x="256" y="490" font-family="Arial,sans-serif" font-weight="700" font-size="52" fill="white" text-anchor="middle" opacity="0.9" letter-spacing="8">FIFA</text>
</svg>
