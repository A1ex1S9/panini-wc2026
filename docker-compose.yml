services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: panini
      POSTGRES_USER: panini
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # host 5434 to avoid clashing with a locally installed postgres
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panini -d panini"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://panini:secret@postgres:5432/panini?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changeme
      PORT: "8080"
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      target: dev
    command: npm run dev -- --host
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
