app = "panini-wc2026-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # DATABASE_URL, REDIS_URL, JWT_SECRET, CORS_ORIGINS are set as secrets:
  #   fly secrets set DATABASE_URL=... REDIS_URL=... JWT_SECRET=... \
  #     CORS_ORIGINS=https://<username>.github.io

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
